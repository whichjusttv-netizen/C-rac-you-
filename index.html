<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TITAN-ULTRA 3D</title>
    <style>
        /* CSS: No White Screen anymore */
        body { margin: 0; overflow: hidden; background-color: #010101; touch-action: none; font-family: sans-serif; }
        #loading-screen {
            position: absolute; width: 100%; height: 100%; background: #000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: #0f0; z-index: 9999; border: 2px solid #0f0;
        }
        .btn-box {
            position: absolute; bottom: 30px; width: 100%; display: flex;
            justify-content: space-around; z-index: 100; pointer-events: none;
        }
        .control-btn {
            width: 70px; height: 70px; background: rgba(0,255,0,0.2);
            border: 2px solid #0f0; border-radius: 15px; color: white;
            display: flex; justify-content: center; align-items: center;
            font-size: 30px; pointer-events: auto;
        }
    </style>
</head>
<body>

    <div id="loading-screen">
        <h2 id="msg">TITAN SYSTEM: SEARCHING SERVER...</h2>
        <p style="font-size: 12px; color: #555;">Bypassing Security Wall...</p>
    </div>

    <div class="btn-box">
        <div style="display: grid; grid-template-columns: repeat(3, 75px); gap: 5px;">
            <div></div><div class="control-btn" id="w">↑</div><div></div>
            <div class="control-btn" id="a">←</div><div class="control-btn" id="s">↓</div><div class="control-btn" id="d">→</div>
        </div>
        <div class="control-btn" id="fire" style="background:red; width:90px; height:90px;">FIRE</div>
    </div>

    <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>

    <script>
        const loading = document.getElementById('loading-screen');
        const msg = document.getElementById('msg');
        let socket;
        let isLinked = false;

        // 1. CONNECTION BYPASS (Security Wall thodne ke liye)
        function startTitanLink() {
            // Hum is baar IP ke sath 'localhost' dono try karenge
            socket = new WebSocket('ws://127.0.0.1:5555');

            socket.onopen = () => {
                socket.send("PING_FROM_GAME"); 
            };

            socket.onmessage = (e) => {
                if(e.data.includes("SYSTEM_CONNECTED_COMPLETE")) {
                    isLinked = true;
                    loading.style.display = 'none'; // Lock khul gaya
                    console.log("Security Bypassed!");
                }
            };

            socket.onerror = () => {
                msg.innerText = "SERVER OFFLINE: START TERMUX!";
                msg.style.color = "red";
            };

            socket.onclose = () => {
                isLinked = false;
                loading.style.display = 'flex';
                setTimeout(startTitanLink, 2000); 
            };
        }

        // 2. 3D ENGINE (No more white screen)
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000500); 
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Lights & Floor
        scene.add(new THREE.AmbientLight(0x00ff00, 0.5));
        const grid = new THREE.GridHelper(200, 40, 0x00ff00, 0x002200);
        scene.add(grid);

        // Enemy Bots (AI Players)
        const geo = new THREE.BoxGeometry(2, 2, 2);
        for(let i=0; i<30; i++) {
            const mat = new THREE.MeshBasicMaterial({ color: 0x00ff00, wireframe: true });
            const bot = new THREE.Mesh(geo, mat);
            bot.position.set(Math.random()*100-50, 1, Math.random()*100-50);
            scene.add(bot);
        }

        camera.position.set(0, 5, 10);

        // 3. CONTROLS
        let keys = { w:0, s:0, a:0, d:0 };
        const setup = (id) => {
            const el = document.getElementById(id);
            el.ontouchstart = () => keys[id] = 1;
            el.ontouchend = () => keys[id] = 0;
        };
        ['w','s','a','d'].forEach(setup);

        function render() {
            requestAnimationFrame(render);
            if(isLinked) {
                if(keys.w) camera.position.z -= 0.6;
                if(keys.s) camera.position.z += 0.6;
                if(keys.a) camera.position.x -= 0.6;
                if(keys.d) camera.position.x += 0.6;
            }
            renderer.render(scene, camera);
        }

        render();
        startTitanLink();
    </script>
</body>
</html>
