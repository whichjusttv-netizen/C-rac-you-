<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TITAN LIVE TRACKER</title>
    <style>
        body { margin: 0; background: #000; color: #0f0; font-family: 'Courier New', monospace; overflow: hidden; }
        #lock-screen {
            position: absolute; width: 100%; height: 100%; background: #000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999; border: 2px solid #0f0; box-sizing: border-box;
        }
        #live-dashboard { display: none; padding: 20px; }
        .stat-box { border: 1px solid #0f0; padding: 15px; margin-bottom: 10px; background: rgba(0,255,0,0.1); }
        .scanning-line { width: 200px; height: 2px; background: #0f0; box-shadow: 0 0 15px #0f0; animation: scan 2s infinite; }
        @keyframes scan { 0%, 100% { transform: translateY(-20px); } 50% { transform: translateY(20px); } }
    </style>
</head>
<body>

    <div id="lock-screen">
        <div class="scanning-line"></div>
        <h2 style="margin-top:30px;">TRACKING PASSWORD...</h2>
        <p id="track-msg">Searching for System Key: TITAN_777</p>
    </div>

    <div id="live-dashboard">
        <h1 style="border-bottom: 2px solid #0f0;">TITAN LIVE DATA</h1>
        <div class="stat-box">
            <div>STATUS: <span id="status">CONNECTING...</span></div>
            <div style="font-size: 12px; margin-top:5px;">KEY MATCHED: <span id="key-found" style="color:white;">NONE</span></div>
        </div>
        <div class="stat-box">
            <div>LIVE SIGNAL: <span id="signal-str">0%</span></div>
            <div id="graph" style="height:20px; background: #030; margin-top:10px; width:0%; transition: 0.5s;"></div>
        </div>
        <button onclick="location.reload()" style="background:#0f0; border:none; padding:10px; width:100%; font-weight:bold;">RE-SCAN SYSTEM</button>
    </div>

    <script>
        const lockScreen = document.getElementById('lock-screen');
        const dashboard = document.getElementById('live-dashboard');
        const statusText = document.getElementById('status');
        const keyText = document.getElementById('key-found');
        const signalBar = document.getElementById('graph');

        function startTracking() {
            // WebSocket local server se judega
            let ws = new WebSocket('ws://127.0.0.1:5555');

            ws.onmessage = (event) => {
                const data = event.data;
                // Password Matching Logic
                if(data.includes("TITAN_777")) {
                    lockScreen.style.display = 'none';
                    dashboard.style.display = 'block';
                    
                    // Live Jankari Update
                    statusText.innerText = "ACTIVE & LIVE ✅";
                    keyText.innerText = "TITAN_777 (MATCHED)";
                    signalBar.style.width = "95%";
                    document.getElementById('signal-str').innerText = "95% (EXCELLENT)";
                }
            };

            ws.onclose = () => {
                lockScreen.style.display = 'flex';
                dashboard.style.display = 'none';
                setTimeout(startTracking, 500); // Agar connection kata to turant wapas judo
            };
        }

        startTracking();
    </script>
</body>
</html>
