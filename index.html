<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TITAN MESH SYSTEM</title>
    <style>
        body { margin: 0; background: #000; color: #0f0; font-family: monospace; overflow: hidden; }
        #mesh-status {
            position: absolute; top: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #020, #000);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 1000; transition: 0.5s;
        }
        .pulse-ring {
            width: 100px; height: 100px; border: 2px solid #0f0;
            border-radius: 50%; animation: mesh-pulse 1.5s infinite;
        }
        @keyframes mesh-pulse {
            0% { transform: scale(0.5); opacity: 1; }
            100% { transform: scale(2); opacity: 0; }
        }
        #hud { position: absolute; bottom: 20px; width: 100%; text-align: center; color: #0f0; z-index: 100; }
    </style>
</head>
<body>

    <div id="mesh-status">
        <div class="pulse-ring"></div>
        <h2 id="log">MESH SYNCING...</h2>
        <p style="font-size: 10px;">CONNECTING VIA INTERNAL WIFI BRIDGE</p>
    </div>

    <div id="hud">CORE SYNC: <span id="sync-val" style="color:red;">WAITING</span></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        const meshUI = document.getElementById('mesh-status');
        const syncVal = document.getElementById('sync-val');
        let meshLocked = false;

        // --- MESH CONNECTIVITY (System-Server Merge) ---
        function startMeshSync() {
            // Localhost ko Internal IP ki tarah use karenge
            let ws = new WebSocket('ws://127.0.0.1:5555');

            ws.onmessage = (e) => {
                if(e.data.includes("TITAN_MESH_SYNC")) {
                    meshLocked = true;
                    meshUI.style.opacity = '0';
                    setTimeout(() => meshUI.style.display = 'none', 500);
                    syncVal.innerText = "LOCKED ✅";
                    syncVal.style.color = "#0f0";
                }
            };

            ws.onclose = () => {
                meshLocked = false;
                meshUI.style.display = 'flex';
                meshUI.style.opacity = '1';
                setTimeout(startMeshSync, 300);
            };
        }

        // --- RACING SYSTEM ENGINE ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const grid = new THREE.GridHelper(300, 60, 0x00ff00, 0x003300);
        scene.add(grid);
        camera.position.set(0, 5, 12);

        function renderLoop() {
            requestAnimationFrame(renderLoop);
            if(meshLocked) {
                grid.position.z += 0.4;
                if(grid.position.z > 10) grid.position.z = 0;
            }
            renderer.render(scene, camera);
        }

        renderLoop();
        startMeshSync();
    </script>
</body>
</html>
