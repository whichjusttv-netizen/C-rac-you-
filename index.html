<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TITAN 5G READY</title>
    <style>
        /* सफ़ेद स्क्रीन को खत्म करने के लिए ब्लैकआउट */
        body { margin: 0; overflow: hidden; background: #000; color: #0f0; font-family: 'Courier New', Courier, monospace; }
        #system-log {
            position: absolute; top: 10px; left: 10px; 
            background: rgba(0,20,0,0.9); padding: 10px;
            border: 1px solid #0f0; font-size: 12px; z-index: 1000;
            max-width: 250px; border-radius: 5px;
        }
        canvas { display: block; }
        /* Mobile Controls */
        .controls {
            position: absolute; bottom: 20px; width: 100%;
            display: flex; justify-content: space-around; pointer-events: none; z-index: 500;
        }
        .btn {
            width: 70px; height: 70px; background: rgba(0,255,0,0.1);
            border: 2px solid #0f0; border-radius: 50%; pointer-events: auto;
            display: flex; justify-content: center; align-items: center; color: #0f0; font-weight: bold;
        }
        .btn:active { background: #0f0; color: #000; }
    </style>
</head>
<body>

    <div id="system-log">
        [TITAN OS V5.0]<br>
        STATUS: <span id="status" style="color:red;">SEARCHING SERVER...</span><br>
        LINK: <span id="link-status">RETRYING...</span>
    </div>

    <div class="controls">
        <div style="display:grid; grid-template-columns: repeat(3, 75px); gap: 10px;">
            <div></div><div class="btn" id="btn-u">↑</div><div></div>
            <div class="btn" id="btn-l">←</div><div class="btn" id="btn-d">↓</div><div class="btn" id="btn-r">→</div>
        </div>
        <div class="btn" style="width:90px; height:90px; border-color:red; color:red;" id="btn-f">FIRE</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        const statusText = document.getElementById('status');
        const linkText = document.getElementById('link-status');
        let socket;
        let isConnected = false;

        // 1. STUBBORN CONNECTION LOGIC (कभी न टूटने वाला जुड़ाव)
        function initTitanCore() {
            // हम सीधा Localhost का इस्तेमाल कर रहे हैं
            socket = new WebSocket('ws://127.0.0.1:5555');

            socket.onopen = () => {
                isConnected = true;
                statusText.innerText = "SYSTEM CONNECTED ✅";
                statusText.style.color = "#0f0";
                linkText.innerText = "STABLE 5G LINK";
                console.log("Titan Heartbeat Started...");
            };

            socket.onmessage = (e) => {
                // सर्वर से डेटा मिलने पर यहाँ हलचल होगी
                if(e.data === "SYSTEM_CONNECTED_COMPLETE") {
                    console.log("Handshake Success!");
                }
            };

            socket.onclose = () => {
                isConnected = false;
                statusText.innerText = "DISCONNECTED ❌";
                statusText.style.color = "red";
                linkText.innerText = "RECONNECTING IN 1s...";
                // यह लाइन जादू है: जैसे ही कटेगा, 1 सेकंड में फिर कोशिश करेगा
                setTimeout(initTitanCore, 1000); 
            };

            socket.onerror = (err) => {
                console.log("Connection Blocked by Security. Rerouting...");
            };
        }

        // 2. 5G OPTIMIZED 3D WORLD (Zero White Screen)
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000); 

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Green Grid (Your Signature Style)
        const grid = new THREE.GridHelper(200, 40, 0x00ff00, 0x002200);
        scene.add(grid);

        // Player / Target
        const geometry = new THREE.BoxGeometry(2, 2, 2);
        const material = new THREE.MeshBasicMaterial({ color: 0x00ff00, wireframe: true });
        const cube = new THREE.Mesh(geometry, material);
        cube.position.y = 1;
        scene.add(cube);

        camera.position.set(0, 5, 10);
        camera.lookAt(0, 0, 0);

        // 3. SMOOTH CONTROLS
        let move = { f:0, b:0, l:0, r:0 };
        const map = (id, k) => {
            const el = document.getElementById(id);
            el.ontouchstart = () => move[k] = 1;
            el.ontouchend = () => move[k] = 0;
        };
        map('btn-u','f'); map('btn-d','b'); map('btn-l','l'); map('btn-r','r');

        function gameLoop() {
            requestAnimationFrame(gameLoop);
            if(isConnected) {
                if(move.f) camera.position.z -= 0.5;
                if(move.b) camera.position.z += 0.5;
                if(move.l) camera.position.x -= 0.5;
                if(move.r) camera.position.x += 0.5;
                cube.rotation.y += 0.05; // Animation check
            }
            renderer.render(scene, camera);
        }

        gameLoop();
        initTitanCore();
    </script>
</body>
</html>
