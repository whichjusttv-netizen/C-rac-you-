<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TITAN-FIX</title>
    <style>
        /* सफ़ेद स्क्रीन को रोकने के लिए पक्का इंतज़ाम */
        body { margin: 0; overflow: hidden; background: #000; color: #0f0; font-family: monospace; }
        canvas { display: block; background: #000; }
        #ui { position: absolute; top: 10px; width: 100%; text-align: center; z-index: 10; }
        .btn { position: absolute; bottom: 40px; right: 30px; width: 80px; height: 80px; background: red; border-radius: 50%; display: flex; justify-content: center; align-items: center; color: white; font-weight: bold; z-index: 20; }
    </style>
</head>
<body>

    <div id="ui">
        <div id="st" style="border: 2px solid #0f0; display: inline-block; padding: 5px 15px;">
            SYSTEM: ONLINE | SERVER: <span id="srv">OFFLINE ❌</span>
        </div>
    </div>

    <div class="btn" id="f">FIRE</div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>

    <script>
        const srv = document.getElementById('srv');
        let socket;

        // 1. कनेक्शन का नया रास्ता (Bypass Logic)
        function connect() {
            // हम 'localhost' की जगह मोबाइल का इंटरनल IP इस्तेमाल करेंगे
            socket = new WebSocket('ws://127.0.0.1:5555');

            socket.onopen = () => {
                srv.innerText = "CONNECTED ✅";
                srv.style.color = "#0f0";
            };

            socket.onmessage = (e) => {
                if(e.data.includes("CONNECTED")) {
                    srv.innerText = "CONNECTED ✅";
                }
            };

            socket.onclose = () => {
                srv.innerText = "OFFLINE ❌";
                setTimeout(connect, 2000); // 2 सेकंड में खुद जुड़ेगा
            };
        }

        // 2. 3D WORLD (Safe Mode)
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000); // काला ताकि सफ़ेद न दिखे
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Ground Grid (हरा जाल)
        const grid = new THREE.GridHelper(100, 20, 0x00ff00, 0x004400);
        scene.add(grid);

        // 3D Objects
        const geometry = new THREE.BoxGeometry(2, 2, 2);
        const material = new THREE.MeshBasicMaterial({ color: 0x00ff00, wireframe: true });
        const cube = new THREE.Mesh(geometry, material);
        cube.position.y = 1;
        scene.add(cube);

        camera.position.set(0, 5, 10);
        camera.lookAt(0, 0, 0);

        function animate() {
            requestAnimationFrame(animate);
            cube.rotation.y += 0.01;
            renderer.render(scene, camera);
        }

        animate();
        connect();
    </script>
</body>
</html>
