<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TITAN MAGNET BOT</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: monospace; }
        #radar {
            position: absolute; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background: radial-gradient(circle, #001, #000); z-index: 1000;
        }
        .circle {
            position: absolute; border: 2px solid #0f0; border-radius: 50%;
            animation: pulse 2s infinite; opacity: 0;
        }
        @keyframes pulse {
            0% { width: 0; height: 0; opacity: 1; }
            100% { width: 500px; height: 500px; opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="radar">
        <div class="circle"></div>
        <div class="circle" style="animation-delay: 0.5s"></div>
        <h2 id="log" style="color: #0f0; text-shadow: 0 0 10px #0f0;">MAGNET BOT: SCANNING...</h2>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        const log = document.getElementById('log');
        const radar = document.getElementById('radar');
        let captured = false;

        // MAGNET BOT CAPTURE LOGIC
        function startCapture() {
            // ये बॉट अब दो अलग रास्तों से सिग्नल पकड़ने की कोशिश करेगा
            let ports = [5555, 8080];
            
            ports.forEach(port => {
                let ws = new WebSocket('ws://127.0.0.1:' + port);

                ws.onmessage = (e) => {
                    if(e.data.includes("MAGNET_CAPTURED") && !captured) {
                        captured = true;
                        radar.style.display = 'none';
                        alert("SIGNAL CAPTURED! SYSTEM LOCKED ✅");
                    }
                };

                ws.onclose = () => { if(!captured) setTimeout(startCapture, 200); };
            });
        }

        // 3D Engine Setup
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer();
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const grid = new THREE.GridHelper(200, 40, 0x00ff00, 0x002200);
        scene.add(grid);
        camera.position.set(0, 5, 10);

        function animate() {
            requestAnimationFrame(animate);
            if(captured) {
                grid.rotation.y += 0.02;
                grid.position.z += 0.3;
                if(grid.position.z > 5) grid.position.z = 0;
            }
            renderer.render(scene, camera);
        }

        animate();
        startCapture();
    </script>
</body>
</html>
