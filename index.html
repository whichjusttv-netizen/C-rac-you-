<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ranjan Titan 3D - Mobile Edition</title>
    <style>
        /* CSS: गेम का लुक और बटन्स */
        body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; touch-action: none; }
        
        #status-bar {
            position: absolute; top: 10px; left: 10px; color: #0f0;
            background: rgba(0,0,0,0.6); padding: 5px 15px; border-radius: 10px;
            font-size: 14px; z-index: 20; border: 1px solid #0f0;
        }

        /* Mobile Controls */
        .joystick-container {
            position: absolute; bottom: 30px; left: 20px;
            display: grid; grid-template-columns: repeat(3, 60px); grid-template-rows: repeat(3, 60px);
            gap: 10px; z-index: 100;
        }
        
        .action-container {
            position: absolute; bottom: 40px; right: 30px; z-index: 100;
        }

        .btn {
            width: 60px; height: 60px; background: rgba(255,255,255,0.2);
            border: 2px solid rgba(255,255,255,0.4); border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            color: white; font-size: 24px; font-weight: bold;
            user-select: none; -webkit-user-select: none;
        }
        .btn:active { background: rgba(0, 255, 0, 0.4); transform: scale(0.9); }
        
        #fire-btn { width: 80px; height: 80px; background: rgba(255, 0, 0, 0.5); border-color: red; }
    </style>
</head>
<body>

    <div id="status-bar">SYSTEM: STARTING... | SERVER: CONNECTING</div>

    <div class="joystick-container">
        <div></div><div class="btn" id="btn-up">↑</div><div></div>
        <div class="btn" id="btn-left">←</div><div></div><div class="btn" id="btn-right">→</div>
        <div></div><div class="btn" id="btn-down">↓</div><div></div>
    </div>

    <div class="action-container">
        <div class="btn" id="fire-btn">FIRE</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // --- 1. SERVER CONNECTION (TITAN CORE) ---
        // रंजन भाई, यह हिस्सा आपके Termux सर्वर से बात करेगा
        const statusEl = document.getElementById('status-bar');
        let socket;

        function connectServer() {
            try {
                socket = new WebSocket('ws://127.0.0.1:5555');
                
                socket.onopen = () => {
                    statusEl.innerText = "SYSTEM: ONLINE | SERVER: CONNECTED ✅";
                    statusEl.style.color = "#0f0";
                };

                socket.onmessage = (event) => {
                    if(event.data.includes("HELLO")) {
                        statusEl.innerText = "VOICE: INCOMING 'HELLO' 🎤";
                        setTimeout(() => statusEl.innerText = "SYSTEM: ONLINE | SERVER: CONNECTED ✅", 3000);
                    }
                };

                socket.onerror = () => {
                    statusEl.innerText = "SYSTEM: ONLINE | SERVER: OFFLINE ❌";
                    statusEl.style.color = "#f00";
                };
            } catch (e) { console.log("Server not active yet."); }
        }
        
        // हर 5 सेकंड में सर्वर को ढूंढने की कोशिश करना
        setInterval(() => { if(!socket || socket.readyState !== 1) connectServer(); }, 5000);

        // --- 2. 3D WORLD SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000011);
        scene.fog = new THREE.Fog(0x000011, 20, 100);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Lights
        const light = new THREE.PointLight(0xffffff, 1, 100);
        light.position.set(10, 10, 10);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040));

        // Floor (3D Ground)
        const grid = new THREE.GridHelper(200, 40, 0x00ff00, 0x222222);
        scene.add(grid);

        // Obstacles (Buildings/Boxes)
        const geometry = new THREE.BoxGeometry(2, 5, 2);
        for(let i=0; i<30; i++) {
            const material = new THREE.MeshNormalMaterial();
            const cube = new THREE.Mesh(geometry, material);
            cube.position.set(Math.random()*80-40, 2.5, Math.random()*80-40);
            scene.add(cube);
        }

        camera.position.set(0, 3, 10);

        // --- 3. PLAYER MOVEMENT LOGIC ---
        let move = { forward: false, backward: false, left: false, right: false };

        // Touch Control Setup
        const setMove = (id, key, val) => {
            document.getElementById(id).addEventListener('touchstart', (e) => { e.preventDefault(); move[key] = val; });
            document.getElementById(id).addEventListener('touchend', (e) => { e.preventDefault(); move[key] = !val; });
        };

        setMove('btn-up', 'forward', true);
        setMove('btn-down', 'backward', true);
        setMove('btn-left', 'left', true);
        setMove('btn-right', 'right', true);

        // Fire Button Action
        document.getElementById('fire-btn').addEventListener('touchstart', () => {
            statusEl.innerText = "ACTION: FIRING! 🔫";
            setTimeout(() => statusEl.innerText = "SYSTEM: ONLINE | SERVER: CONNECTED ✅", 500);
        });

        // --- 4. GAME LOOP ---
        function animate() {
            requestAnimationFrame(animate);

            // रफ़्तार और दिशा
            if (move.forward) camera.position.z -= 0.3;
            if (move.backward) camera.position.z += 0.3;
            if (move.left) camera.position.x -= 0.3;
            if (move.right) camera.position.x += 0.3;

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
        connectServer();
    </script>
</body>
</html>
