<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TITAN UNBREAKABLE</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; touch-action: none; }
        #overlay {
            position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.9);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: #0f0; z-index: 9999; text-align: center; border: 5px solid #0f0; box-sizing: border-box;
        }
        #hud {
            position: absolute; top: 10px; width: 100%; text-align: center; color: #0f0;
            font-size: 14px; text-shadow: 0 0 5px #0f0; z-index: 100;
        }
        .fire-btn {
            position: absolute; bottom: 40px; right: 30px; width: 100px; height: 100px;
            background: rgba(255,0,0,0.6); border: 4px solid #fff; border-radius: 50%;
            display: flex; justify-content: center; align-items: center; color: #fff;
            font-weight: bold; font-size: 20px; z-index: 200; box-shadow: 0 0 20px red;
        }
    </style>
</head>
<body>

    <div id="overlay">
        <h1 style="font-size: 40px; margin-bottom: 10px;">TITAN SYSTEM</h1>
        <p id="msg">WAITING FOR BASH SIGNAL...</p>
        <div style="width: 50px; height: 50px; border: 5px solid #0f0; border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite;"></div>
    </div>

    <div id="hud">SYSTEM: <span id="sync">OFFLINE ❌</span> | 5G SHIELD: ACTIVE</div>
    
    <div class="fire-btn" id="fire">FIRE</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        const overlay = document.getElementById('overlay');
        const syncStatus = document.getElementById('sync');
        const msg = document.getElementById('msg');
        let socket;
        let lockEngaged = false;

        // 1. STICKY CONNECTION (चुंबक वाला लॉजिक)
        function forceConnect() {
            // हम पोर्ट 5555 पर सीधा हमला करेंगे
            socket = new WebSocket('ws://127.0.0.1:5555');

            socket.onopen = () => {
                lockEngaged = true;
                overlay.style.display = 'none';
                syncStatus.innerText = "LOCKED ✅";
                syncStatus.style.color = "#0f0";
                console.log("TITAN MAGNET ENGAGED!");
            };

            socket.onmessage = (e) => {
                // सर्वर से कोई भी सिग्नल आए, हम उसे 'Energy' की तरह इस्तेमाल करेंगे
                console.log("Bash Signal Caught!");
            };

            socket.onclose = () => {
                if(lockEngaged) {
                    msg.innerText = "ANDROID ATTACK DETECTED! RE-ARMING...";
                }
                // अगर कटा, तो 0.01 सेकंड में वापस जुड़ो!
                setTimeout(forceConnect, 10); 
            };
        }

        // 2. 3D WORLD (Full High-Speed Grid)
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const grid = new THREE.GridHelper(500, 50, 0x00ff00, 0x004400);
        scene.add(grid);

        camera.position.set(0, 7, 15);
        camera.lookAt(0, 0, 0);

        function animate() {
            requestAnimationFrame(animate);
            if(lockEngaged) {
                grid.position.z += 0.5; // तेज रफ़्तार का अहसास
                if(grid.position.z > 10) grid.position.z = 0;
            }
            renderer.render(scene, camera);
        }

        // Spin Animation for Loader
        const style = document.createElement('style');
        style.innerHTML = "@keyframes spin { to { transform: rotate(360deg); } }";
        document.head.appendChild(style);

        animate();
        forceConnect();
    </script>
</body>
</html>
