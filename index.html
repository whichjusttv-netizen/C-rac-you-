<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ranjan Titan 3D - Server Locked</title>
    <style>
        /* CSS: पूरा गेम डार्क और गेमिंग लुक में */
        body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; touch-action: none; }
        
        #overlay {
            position: absolute; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: flex;
            justify-content: center; align-items: center;
            color: #ff0000; z-index: 1000; font-size: 20px; text-align: center;
        }

        #status-bar {
            position: absolute; top: 20px; left: 20px; color: #0f0;
            background: rgba(0,0,0,0.7); padding: 10px; border-radius: 5px;
            border: 1px solid #0f0; z-index: 100; font-weight: bold;
        }

        /* Mobile Buttons */
        .controls {
            position: absolute; bottom: 30px; width: 100%;
            display: flex; justify-content: space-between; padding: 0 30px;
            box-sizing: border-box; z-index: 500; pointer-events: none;
        }
        .btn {
            width: 70px; height: 70px; background: rgba(255,255,255,0.2);
            border: 2px solid white; border-radius: 50%; pointer-events: auto;
            display: flex; justify-content: center; align-items: center;
            color: white; font-size: 30px;
        }
        .btn:active { background: rgba(0, 255, 0, 0.5); }
    </style>
</head>
<body>

    <div id="overlay">
        <div>
            <h2>TITAN SERVER REQUIRED</h2>
            <p id="lock-msg">Searching for Termux Server...</p>
            <p style="font-size: 12px; color: #666;">Please Start: python titan_genesis.py</p>
        </div>
    </div>

    <div id="status-bar">SERVER: DISCONNECTED ❌</div>

    <div class="controls">
        <div style="display:grid; grid-template-columns: repeat(3, 70px); gap: 10px;">
            <div></div><div class="btn" id="up">↑</div><div></div>
            <div class="btn" id="left">←</div><div></div><div class="btn" id="right">→</div>
            <div></div><div class="btn" id="down">↓</div><div></div>
        </div>
        <div class="btn" style="width:100px; height:100px; background:red;" id="fire">FIRE</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        const overlay = document.getElementById('overlay');
        const statusEl = document.getElementById('status-bar');
        const lockMsg = document.getElementById('lock-msg');
        let socket;
        let isConnected = false;

        // --- 1. SERVER CONNECTION (The Lock) ---
        function connect() {
            socket = new WebSocket('ws://127.0.0.1:5555');

            socket.onopen = () => {
                console.log("Linking to Termux...");
            };

            socket.onmessage = (event) => {
                if (event.data.includes("SYSTEM_CONNECTED_COMPLETE")) {
                    isConnected = true;
                    overlay.style.display = 'none'; // गेम अनलॉक हो गया
                    statusEl.innerText = "SERVER: CONNECTED ✅";
                }
            };

            socket.onerror = () => {
                statusEl.innerText = "SERVER: OFFLINE ❌";
                lockMsg.innerText = "Termux Server Not Found!";
            };

            socket.onclose = () => {
                isConnected = false;
                overlay.style.display = 'flex';
                setTimeout(connect, 3000);
            };
        }

        // --- 2. 3D WORLD (Everything Visible) ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000022); // नीला आसमान

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Lights (इसकी वजह से सब दिखेगा)
        const light = new THREE.AmbientLight(0xffffff, 1);
        scene.add(light);

        // Ground (हरा जाल)
        const grid = new THREE.GridHelper(200, 50, 0x00ff00, 0x004400);
        scene.add(grid);

        // 3D Player Cubes (दिखने वाले ऑब्जेक्ट्स)
        const geometry = new THREE.BoxGeometry(2, 2, 2);
        for(let i=0; i<50; i++) {
            const material = new THREE.MeshNormalMaterial();
            const cube = new THREE.Mesh(geometry, material);
            cube.position.set(Math.random()*100-50, 1, Math.random()*100-50);
            scene.add(cube);
        }

        camera.position.set(0, 5, 10);

        // --- 3. CONTROLS ---
        let move = { f: false, b: false, l: false, r: false };
        const setup = (id, k) => {
            const el = document.getElementById(id);
            el.ontouchstart = () => move[k] = true;
            el.ontouchend = () => move[k] = false;
        };
        setup('up','f'); setup('down','b'); setup('left','l'); setup('right','r');

        function animate() {
            requestAnimationFrame(animate);
            if(isConnected) {
                if(move.f) camera.position.z -= 0.5;
                if(move.b) camera.position.z += 0.5;
                if(move.l) camera.position.x -= 0.5;
                if(move.r) camera.position.x += 0.5;
            }
            renderer.render(scene, camera);
        }

        animate();
        connect();
    </script>
</body>
</html>
